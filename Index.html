<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All-in-One Page</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

/* Header */
header {
    background: #333;
    color: #fff;
    padding: 10px;
    text-align: right;
}

button {
    padding: 8px 12px;
    border: none;
    background: #007bff;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #0056b3;
}

/* Center content */
.container {
    padding: 20px;
    text-align: center;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 300px;
}

/* Input */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

/* Upload section */
#uploadSection {
    display: none;
    margin-top: 20px;
}

.link-box {
    margin-top: 15px;
}

.link-item {
    background: white;
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Floating alert */
.alert {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #28a745;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    display: none;
}

/* Responsive */
@media (max-width: 600px) {
    .popup-content {
        width: 95%;
    }
}
</style>
</head>

<body>

<header>
    <button onclick="openLogin()">Login</button>
</header>

<div class="container">
    <h2>Welcome</h2>

    <div id="uploadSection">
        <input type="text" id="linkInput" placeholder="Paste your link here">
        <button onclick="addLink()">Upload Link</button>

        <div class="link-box" id="linkBox"></div>
    </div>
</div>

<!-- Login Popup -->
<div class="popup" id="loginPopup">
    <div class="popup-content">
        <h3>Login</h3>
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="checkLogin()">Submit</button>
    </div>
</div>

<!-- Floating Alert -->
<div class="alert" id="alertBox"></div>

<script>
// Open login popup
function openLogin() {
    document.getElementById("loginPopup").style.display = "flex";
}

// Check password
function checkLogin() {
    let pass = document.getElementById("password").value;

    if (pass === "7") {
        document.getElementById("loginPopup").style.display = "none";
        document.getElementById("uploadSection").style.display = "block";
        showAlert("Login Successful!");
    } else {
        showAlert("Wrong Password!", true);
    }
}

// Add link
function addLink() {
    let input = document.getElementById("linkInput");
    let url = input.value.trim();

    if (url === "") {
        showAlert("Enter a link!", true);
        return;
    }

    let div = document.createElement("div");
    div.className = "link-item";

    let a = document.createElement("a");
    a.href = url;
    a.target = "_blank";
    a.innerText = url;

    let delBtn = document.createElement("button");
    delBtn.innerText = "Delete";
    delBtn.style.background = "red";

    delBtn.onclick = function() {
        div.remove();
        showAlert("Deleted!");
    };

    div.appendChild(a);
    div.appendChild(delBtn);

    document.getElementById("linkBox").appendChild(div);

    input.value = "";
    showAlert("Link Added!");
}

// Floating alert
function showAlert(msg, error=false) {
    let alertBox = document.getElementById("alertBox");
    alertBox.innerText = msg;
    alertBox.style.background = error ? "#dc3545" : "#28a745";
    alertBox.style.display = "block";

    setTimeout(() => {
        alertBox.style.display = "none";
    }, 2000);
}
</script>

</body>
</html>
